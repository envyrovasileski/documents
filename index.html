  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"04cb4054-0f64-4a78-9feb-3589951964b5\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"3a5506e6-2a88-4f4e-8426-dac04623416e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"2b6b94e0-b60a-4594-b06c-b9bc43e32f05\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --bg: #f6f4ef;\n    --paper: #fbf9f4;\n    --ink: #15140f;\n    --ink-2: #2a2924;\n    --muted: #6e6a5e;\n    --line: #d8d3c4;\n    --line-2: #c4bea9;\n    --neon-m: #ff1d8e;\n    --neon-c: #00b8ff;\n    --neon-o: #ff7a1a;\n    --neon-g: #00d240;\n    --neon-y: #f5d000;\n    --serif: \"Fraunces\", \"Times New Roman\", serif;\n    --sans: \"Inter Tight\", -apple-system, BlinkMacSystemFont, sans-serif;\n    --mono: \"JetBrains Mono\", ui-monospace, monospace;\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body { background: var(--bg); }\n  body {\n    color: var(--ink);\n    font-family: var(--sans);\n    font-size: 14px;\n    line-height: 1.5;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n    padding: 40px 20px;\n    min-height: 100vh;\n  }\n  ::selection { background: var(--ink); color: var(--bg); }\n\n  .page {\n    width: 880px;\n    max-width: 100%;\n    margin: 0 auto;\n    background: var(--paper);\n    border: 1px solid var(--line);\n    box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 30px 60px -30px rgba(0,0,0,0.18);\n    padding: 52px 60px 46px;\n    position: relative;\n  }\n  .page::before {\n    content: \"\";\n    position: absolute;\n    left: 0; right: 0; top: 0;\n    height: 4px;\n    background: linear-gradient(\n      90deg,\n      var(--neon-m) 0%,\n      var(--neon-c) 28%,\n      var(--neon-o) 52%,\n      var(--neon-g) 76%,\n      var(--neon-y) 100%\n    );\n  }\n\n  /* ---- masthead ---- */\n  .mast {\n    display: flex; justify-content: space-between; align-items: flex-start;\n    gap: 28px;\n    padding-bottom: 20px;\n    border-bottom: 1px solid var(--line);\n  }\n  .mast-left .wm {\n    font-family: var(--mono);\n    font-weight: 500;\n    font-size: 18px;\n    letter-spacing: -0.03em;\n    color: var(--ink);\n    line-height: 1;\n    display: inline-flex; align-items: baseline;\n  }\n  .mast-left .wm::after {\n    content: \"_\";\n    margin-left: 1px;\n    color: var(--neon-m);\n    animation: blink 1.1s steps(2) infinite;\n  }\n  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }\n  .mast-left .tag {\n    margin-top: 6px;\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n  .mast-right {\n    text-align: right;\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--muted);\n    line-height: 1.7;\n  }\n  .mast-right .v {\n    color: var(--ink);\n    font-family: var(--sans);\n    font-size: 13px;\n    letter-spacing: 0;\n    text-transform: none;\n    font-weight: 500;\n  }\n\n  /* ---- title block ---- */\n  .title-block {\n    padding: 30px 0 24px;\n    display: grid;\n    grid-template-columns: 1fr auto;\n    gap: 32px;\n    align-items: end;\n    border-bottom: 1px solid var(--line);\n  }\n  .meta-line {\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 12px;\n    display: flex; gap: 12px; align-items: center;\n  }\n  .meta-line .dot {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: var(--neon-c);\n    box-shadow: 0 0 6px rgba(0,184,255,0.55);\n  }\n  h1 {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: 40px;\n    line-height: 1.04;\n    letter-spacing: -0.03em;\n    text-wrap: balance;\n  }\n  h1 em { font-style: normal; font-weight: 300; color: var(--muted); }\n  .for-client {\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--muted);\n    text-align: right;\n    line-height: 1.6;\n  }\n  .for-client .name {\n    display: block;\n    font-family: var(--serif);\n    font-size: 22px;\n    letter-spacing: -0.015em;\n    text-transform: none;\n    color: var(--ink);\n    margin-top: 2px;\n    font-weight: 400;\n  }\n\n  /* ---- lede ---- */\n  .lede {\n    padding: 22px 0 26px;\n    font-family: var(--serif);\n    font-weight: 300;\n    font-size: 18px;\n    line-height: 1.4;\n    color: var(--ink-2);\n    letter-spacing: -0.01em;\n    max-width: 720px;\n    text-wrap: pretty;\n  }\n  .lede .hl {\n    background: linear-gradient(transparent 55%, rgba(245,208,0,0.5) 55%, rgba(245,208,0,0.5) 95%, transparent 95%);\n    padding: 0 3px;\n    color: var(--ink);\n  }\n\n  /* ---- section row ---- */\n  .row {\n    display: grid;\n    grid-template-columns: 140px 1fr;\n    gap: 28px;\n    padding: 22px 0;\n    border-top: 1px solid var(--line);\n  }\n  .row > .k {\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--k-c, var(--muted));\n    padding-top: 3px;\n    font-weight: 600;\n  }\n\n  /* ---- idea cards grid ---- */\n  .ideas {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 14px;\n  }\n  .idea {\n    border: 1px solid var(--line);\n    background: var(--bg);\n    padding: 16px 18px 16px;\n    position: relative;\n    display: flex; flex-direction: column;\n    gap: 8px;\n  }\n  .idea::before {\n    content: \"\";\n    position: absolute;\n    left: -1px; top: -1px; bottom: -1px;\n    width: 3px;\n    background: var(--accent, var(--ink));\n  }\n  .idea.lead { grid-column: span 2; background: var(--paper); }\n  .idea .num {\n    font-family: var(--mono);\n    font-size: 9.5px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--muted);\n    display: flex; align-items: center; gap: 10px;\n  }\n  .idea .num .badge {\n    font-family: var(--mono);\n    font-size: 8.5px;\n    letter-spacing: 0.18em;\n    padding: 2px 7px;\n    border-radius: 999px;\n    background: var(--accent, var(--ink));\n    color: var(--paper);\n    line-height: 1.4;\n    text-transform: uppercase;\n  }\n  .idea h3 {\n    font-family: var(--serif);\n    font-weight: 500;\n    font-size: 20px;\n    letter-spacing: -0.015em;\n    line-height: 1.15;\n    color: var(--ink);\n  }\n  .idea .desc {\n    font-size: 13px;\n    line-height: 1.5;\n    color: var(--ink-2);\n  }\n  .idea .desc strong { font-weight: 500; color: var(--ink); }\n  .idea .desc .q {\n    font-family: var(--mono);\n    font-size: 12px;\n    color: var(--ink);\n    background: rgba(0,0,0,0.04);\n    padding: 1px 5px;\n    border-radius: 3px;\n  }\n  .idea ul {\n    list-style: none;\n    margin-top: 2px;\n    display: flex; flex-direction: column;\n    gap: 4px;\n  }\n  .idea li {\n    padding-left: 16px;\n    position: relative;\n    font-size: 12.5px;\n    line-height: 1.45;\n    color: var(--ink-2);\n  }\n  .idea li::before {\n    content: \"→\";\n    position: absolute; left: 0; top: 0;\n    font-family: var(--mono);\n    color: var(--accent, var(--ink));\n    font-weight: 500;\n  }\n  .idea li strong { font-weight: 500; color: var(--ink); }\n  .idea blockquote {\n    margin-top: 4px;\n    padding: 8px 12px;\n    border-left: 2px solid var(--accent, var(--ink));\n    background: rgba(0,0,0,0.02);\n    font-family: var(--serif);\n    font-weight: 300;\n    font-size: 13px;\n    line-height: 1.45;\n    color: var(--ink-2);\n  }\n\n  .idea.c1 { --accent: var(--neon-c); }\n  .idea.c2 { --accent: var(--neon-m); }\n  .idea.c3 { --accent: var(--neon-o); }\n  .idea.c4 { --accent: var(--neon-g); }\n\n  /* ---- guardrails ---- */\n  .guardrails {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 0;\n    border-top: 1px solid var(--ink);\n    border-bottom: 1px solid var(--ink);\n  }\n  .gcell {\n    padding: 16px 20px 16px 0;\n    border-right: 1px solid var(--line);\n  }\n  .gcell:nth-child(2) { padding-left: 20px; padding-right: 20px; }\n  .gcell:last-child { padding-left: 20px; padding-right: 0; border-right: none; }\n  .gcell .gk {\n    font-family: var(--mono);\n    font-size: 9.5px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 8px;\n    display: flex; align-items: center; gap: 8px;\n  }\n  .gcell .gk::before {\n    content: \"\";\n    width: 6px; height: 6px;\n    background: var(--gk-c, var(--ink));\n    border-radius: 50%;\n  }\n  .gcell:nth-child(1) .gk { --gk-c: var(--neon-m); }\n  .gcell:nth-child(2) .gk { --gk-c: var(--neon-c); }\n  .gcell:nth-child(3) .gk { --gk-c: var(--neon-g); }\n  .gcell .gh {\n    font-family: var(--serif);\n    font-weight: 500;\n    font-size: 15px;\n    letter-spacing: -0.01em;\n    line-height: 1.2;\n    margin-bottom: 4px;\n  }\n  .gcell .gd {\n    font-size: 12.5px;\n    line-height: 1.45;\n    color: var(--ink-2);\n  }\n\n  /* ---- foot / cta ---- */\n  .foot {\n    margin-top: 26px;\n    padding-top: 20px;\n    border-top: 1px solid var(--ink);\n    display: grid;\n    grid-template-columns: 1fr auto;\n    gap: 24px;\n    align-items: center;\n  }\n  .foot-left {\n    font-family: var(--serif);\n    font-weight: 300;\n    font-size: 17px;\n    line-height: 1.35;\n    color: var(--ink-2);\n    letter-spacing: -0.01em;\n    max-width: 520px;\n    text-wrap: pretty;\n  }\n  .foot-left strong {\n    font-family: var(--serif);\n    font-weight: 500;\n    color: var(--ink);\n  }\n  .cta {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 14px 22px;\n    background: var(--ink);\n    color: var(--bg);\n    border-radius: 999px;\n    border: 1px solid var(--ink);\n    font-family: var(--sans);\n    font-size: 13px;\n    font-weight: 500;\n    letter-spacing: 0.01em;\n    text-decoration: none;\n    transition: transform 0.2s ease;\n    white-space: nowrap;\n  }\n  .cta:hover { transform: translateY(-2px); }\n  .cta .arrow { transition: transform 0.2s ease; }\n  .cta:hover .arrow { transform: translateX(3px); }\n\n  .sign-strip {\n    margin-top: 20px;\n    padding-top: 14px;\n    border-top: 1px solid var(--line);\n    display: flex; justify-content: space-between; align-items: center;\n    flex-wrap: wrap; gap: 12px;\n    font-family: var(--mono);\n    font-size: 9.5px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n  .sign-strip .from {\n    font-family: var(--serif);\n    font-size: 14px;\n    font-weight: 400;\n    color: var(--ink-2);\n    letter-spacing: 0;\n    text-transform: none;\n  }\n  .sign-strip .from b { font-style: normal; font-weight: 500; color: var(--ink); }\n\n  @media (max-width: 720px) {\n    body { padding: 16px 12px; }\n    .page { padding: 32px 24px 28px; }\n    h1 { font-size: 30px; }\n    .title-block { grid-template-columns: 1fr; gap: 18px; align-items: start; }\n    .for-client { text-align: left; }\n    .row { grid-template-columns: 1fr; gap: 10px; padding: 18px 0; }\n    .ideas { grid-template-columns: 1fr; }\n    .idea.lead { grid-column: auto; }\n    .guardrails { grid-template-columns: 1fr; }\n    .gcell { padding: 14px 0 !important; border-right: none; border-top: 1px solid var(--line); }\n    .gcell:first-child { border-top: none; }\n    .foot { grid-template-columns: 1fr; }\n  }\n\n  @media print {\n    @page { size: Letter; margin: 0.4in; }\n    body { padding: 0; background: white; }\n    .page {\n      width: 100%; box-shadow: none; border: none;\n      padding: 18px 22px;\n    }\n    .mast-left .wm::after { animation: none; }\n    .dl-fab { display: none !important; }\n  }\n  /* Download PDF floating button (screen only) */\n  .dl-fab {\n    position: fixed;\n    right: 24px;\n    bottom: 24px;\n    z-index: 50;\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    padding: 12px 18px;\n    background: var(--ink);\n    color: var(--bg);\n    border-radius: 999px;\n    border: 1px solid var(--ink);\n    font-family: var(--sans);\n    font-size: 13px;\n    font-weight: 500;\n    letter-spacing: 0.01em;\n    text-decoration: none;\n    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.18);\n    transition: transform 0.18s ease, box-shadow 0.18s ease;\n    cursor: pointer;\n  }\n  .dl-fab:hover {\n    transform: translateY(-2px);\n    box-shadow: 0 14px 36px -12px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.2);\n  }\n  .dl-fab .arrow { transition: transform 0.18s ease; }\n  .dl-fab:hover .arrow { transform: translateY(2px); }\n  .dl-fab .dot {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: var(--neon-g);\n    box-shadow: 0 0 6px rgba(0,210,64,0.7);\n  }\n  .dl-fab.png { right: 196px; }\n  .dl-fab.png .dot { background: var(--neon-c); box-shadow: 0 0 6px rgba(0,184,255,0.7); }\n  .dl-fab[disabled] { opacity: 0.6; pointer-events: none; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<article class=\"page\">\n\n  <!-- masthead -->\n  <header class=\"mast\">\n    <div class=\"mast-left\">\n      <span class=\"wm\">envyro<\u002Fspan>\n      <div class=\"tag\">AI agents · automations · integrations<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mast-right\">\n      <div>Brief · Rev 01<\u002Fdiv>\n      <div class=\"v\">May 26, 2026<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- title -->\n  <div class=\"title-block\">\n    <div>\n      <div class=\"meta-line\"><span class=\"dot\"><\u002Fspan>Internal only · No customer-facing automation<\u002Fdiv>\n      <h1>Where AI fits <em>without changing how you operate.<\u002Fem><\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"for-client\">\n      Prepared for\n      <span class=\"name\">Direct Line Supplies<\u002Fspan>\n      Attn: Daniel Milgrom\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- lede -->\n  <p class=\"lede\">\n    The answers are <span class=\"hl\">already in your order history and catalog<\u002Fspan> — they're just trapped in a format where you have to remember them. None of this collects new data or asks you to adopt a system. You still answer the phone. You still know your customers. You still do business the way that's worked.\n  <\u002Fp>\n\n  <!-- ideas -->\n  <section class=\"row\">\n    <div class=\"k\" style=\"--k-c: var(--neon-c);\">01 · Where it fits<\u002Fdiv>\n    <div class=\"ideas\">\n\n      <div class=\"idea lead c1\">\n        <div class=\"num\"><span>Idea 01<\u002Fspan> <span class=\"badge\">Best fit<\u002Fspan><\u002Fdiv>\n        <h3>Reorder Radar<\u002Fh3>\n        <div class=\"desc\">\n          Watches your own order history, learns each repeat customer's real reorder rhythm, and quietly tells <strong>you<\u002Fstrong> when someone's due — so you make the call first, instead of waiting for the reorder to land, slip, or go to whoever happened to be faster that day.\n        <\u002Fdiv>\n        <ul>\n          <li><strong>Cadence, not guesswork<\u002Fstrong> — derives each customer's actual interval (some run 6 weeks, some run 10), not a rule of thumb you have to hold in your head.<\u002Fli>\n          <li><strong>Pairs what they buy together<\u002Fstrong> — if a customer always grabs paper with toner, the nudge says so.<\u002Fli>\n          <li><strong>Flags the drift<\u002Fstrong> — a regular on a 6-week cycle who hasn't reordered in 12 is the single most valuable call you can make this week. Catches churn before it's gone.<\u002Fli>\n          <li><strong>Ranks by value<\u002Fstrong> — finite hours, so the accounts that matter most surface first.<\u002Fli>\n        <\u002Ful>\n        <blockquote>A short weekly \"here's who to call and why.\" You still do all the talking.<\u002Fblockquote>\n      <\u002Fdiv>\n\n      <div class=\"idea c2\">\n        <div class=\"num\"><span>Idea 02<\u002Fspan> <span class=\"badge\">Quick win<\u002Fspan><\u002Fdiv>\n        <h3>Quote Builder<\u002Fh3>\n        <div class=\"desc\">\n          Type or paste what a customer wants — <span class=\"q\">\"two cases of HP 26X, a box of letter copy paper, that Fellowes shredder\"<\u002Fspan> — and it pulls live SKUs and pricing from your Shopify catalog into a clean, branded quote in seconds.\n        <\u002Fdiv>\n        <div class=\"desc\" style=\"color: var(--muted); font-size:12.5px;\">\n          You still talk to the customer; you just stop hand-building quotes from memory. The price-tracking / quoting side you flagged, handled.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"idea c3\">\n        <div class=\"num\"><span>Idea 03<\u002Fspan> <span class=\"badge\">Internal<\u002Fspan><\u002Fdiv>\n        <h3>Price-Change Watcher<\u002Fh3>\n        <div class=\"desc\">\n          You already track supplier price changes by hand. This flags when your cost — or competitor pricing on key SKUs like toner — shifts, so margins don't quietly erode while you're focused elsewhere.\n        <\u002Fdiv>\n        <div class=\"desc\" style=\"color: var(--muted); font-size:12.5px;\">\n          Pure internal tool. No customer ever sees it.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"idea c4\" style=\"grid-column: span 2;\">\n        <div class=\"num\"><span>Idea 04<\u002Fspan> <span class=\"badge\">One-time or ongoing<\u002Fspan><\u002Fdiv>\n        <h3>Catalog &amp; Data Hygiene<\u002Fh3>\n        <div class=\"desc\">\n          6 top-level categories, hundreds of sub-collections, thousands of SKUs across ink, toner, POS rolls, furniture, and tech. An agent that finds <strong>missing UPCs and descriptions, duplicate listings, and gaps<\u002Fstrong> — so the Shopify storefront stays clean. Runs as a one-time sweep or on a recurring schedule.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- guardrails -->\n  <section class=\"row\">\n    <div class=\"k\" style=\"--k-c: var(--neon-y);\">02 · Guardrails<\u002Fdiv>\n    <div class=\"guardrails\">\n      <div class=\"gcell\">\n        <div class=\"gk\">Rule 01<\u002Fdiv>\n        <div class=\"gh\">No bot talks to anyone.<\u002Fdiv>\n        <div class=\"gd\">Everything is a private heads-up or an internal tool. The opposite of an AI SDR.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"gcell\">\n        <div class=\"gk\">Rule 02<\u002Fdiv>\n        <div class=\"gh\">No new behavior.<\u002Fdiv>\n        <div class=\"gd\">It's your data, read and enriched. Nothing for you or your customers to adopt.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"gcell\">\n        <div class=\"gk\">Rule 03<\u002Fdiv>\n        <div class=\"gh\">Reinforces the moat.<\u002Fdiv>\n        <div class=\"gd\">Makes the human touch you already sell sharper — it doesn't replace it.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- foot -->\n  <div class=\"foot\">\n    <div class=\"foot-left\">\n      <strong>One thing to confirm first:<\u002Fstrong> all of this works as long as your order history and catalog data are reachable — exportable from the back-end, or sitting in a CRM. That answer tells me whether this is a clean build or a bit of data-wrangling first.\n      <div style=\"margin-top:10px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--ink); text-transform: none; font-weight: 500;\">\n        → What are you running for order history right now?\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <a class=\"cta\" href=\"mailto:matea@envyro.io?subject=Direct%20Line%20Supplies%20%C2%B7%20Order%20history%20%26%20next%20steps\">Let's scope it <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n\n  <div class=\"sign-strip\">\n    <div class=\"from\">From <b>Envyro<\u002Fb> · AI agents for businesses<\u002Fdiv>\n    <div>matea@envyro.io &nbsp;·&nbsp; envyro.io<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Farticle>\n\n<button class=\"dl-fab\" id=\"printBtn\" type=\"button\" title=\"Open print / save as PDF\">\n  <span class=\"dot\"><\u002Fspan>\n  Download PDF\n  <span class=\"arrow\">↓<\u002Fspan>\n<\u002Fbutton>\n<script>\n  document.getElementById('printBtn').addEventListener('click', () => window.print());\n<\u002Fscript>\n\n<button class=\"dl-fab png\" id=\"exportPng\" type=\"button\" title=\"Export this page as PNG\">\n  <span class=\"dot\"><\u002Fspan>\n  Export PNG\n  <span class=\"arrow\">↓<\u002Fspan>\n<\u002Fbutton>\n\n<script src=\"80831813-d65f-48d3-95f2-b117d50a6918\"><\u002Fscript>\n<script>\n(function () {\n  const btn = document.getElementById('exportPng');\n  if (!btn) return;\n  btn.addEventListener('click', async () => {\n    const node = document.querySelector('article.page');\n    if (!node || !window.htmlToImage) return;\n    const original = btn.innerHTML;\n    btn.setAttribute('disabled', 'true');\n    btn.innerHTML = '<span class=\"dot\"><\u002Fspan> Exporting…';\n    try {\n      if (document.fonts && document.fonts.ready) { await document.fonts.ready; }\n      const rect = node.getBoundingClientRect();\n      const dataUrl = await window.htmlToImage.toPng(node, {\n        pixelRatio: 2,\n        backgroundColor: '#f6f4ef',\n        width: rect.width,\n        height: rect.height,\n        cacheBust: true,\n        style: { transform: 'none' }\n      });\n      const a = document.createElement('a');\n      a.href = dataUrl;\n      a.download = 'Direct Line Supplies — Where AI Fits.png';\n      document.body.appendChild(a);\n      a.click();\n      a.remove();\n    } catch (e) {\n      console.error('PNG export failed', e);\n      alert('PNG export failed: ' + (e && e.message ? e.message : e));\n    } finally {\n      btn.innerHTML = original;\n      btn.removeAttribute('disabled');\n    }\n  });\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
